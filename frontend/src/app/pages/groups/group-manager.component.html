<div class="container mx-auto p-6 bg-gray-50 h-screen flex flex-col">
  <div class="flex-none pb-6">
    <div
      class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center"
    >
      <div>
        <h2 class="text-3xl font-black text-gray-800">Gerenciar Empresas</h2>
        <p class="text-gray-500 text-sm font-medium">Crie e organize as Empresas</p>
      </div>
      <button
        (click)="novoGrupo()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95 flex items-center gap-2"
      >
        <span>➕</span> Nova Empresa
      </button>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto custom-scrollbar">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (g of groups; track g.id) {
        <div
          class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow group"
        >
          <div class="flex justify-between items-start mb-4">
            <div
              class="h-12 w-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center text-2xl"
            >
              👥
            </div>
            <div class="flex gap-1">
              <button
                (click)="editarGrupo(g)"
                class="p-2 hover:bg-gray-100 rounded-lg text-gray-400 hover:text-blue-600 transition-colors"
              >
                ✏️
              </button>
              <button
                (click)="excluirGrupo(g.id)"
                class="p-2 hover:bg-gray-100 rounded-lg text-gray-400 hover:text-red-600 transition-colors"
              >
                🗑️
              </button>
            </div>
          </div>

          <h3 class="text-xl font-bold text-gray-800 mb-1">{{ g.nome }}</h3>
          <p class="text-gray-500 text-sm mb-4 h-10 line-clamp-2">
            {{ g.descricao || 'Sem descrição definida.' }}
          </p>

          <div class="pt-4 border-t border-gray-50 flex justify-between items-center">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Membros</span>
            <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-black">
              {{ g.total_membros || 0 }} Integrantes
            </span>
          </div>
        </div>
      } @empty {
        <div class="col-span-full text-center p-10 text-gray-400">
          Nenhuma empresa cadastrada ainda.
        </div>
      }
    </div>
  </div>
</div>
