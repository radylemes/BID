<div class="container mx-auto p-4 bg-gray-50 h-screen flex flex-col">
  <div class="flex-none bg-gray-50 pb-4">
    <div
      class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4 bg-white p-6 rounded-xl shadow-md border border-gray-100"
    >
      <div class="flex-none">
        <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">Usuários</h2>
        <p class="text-sm text-gray-500 font-medium">
          Gerencie {{ filteredUsers.length }} usuários ativos
        </p>
      </div>

      <div class="flex flex-col md:flex-row items-center gap-3 w-full lg:w-auto">
        <div class="relative group w-full md:w-72">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
            <span class="text-lg">🔍</span>
          </span>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            (input)="filtrar()"
            placeholder="Pesquisar..."
            class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg shadow-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white text-gray-700 transition-all text-sm h-[42px]"
          />
        </div>

        <div class="flex flex-wrap gap-2 w-full md:w-auto justify-end">
          <button
            (click)="adicionarUsuario()"
            class="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-semibold shadow-md text-sm active:scale-95 h-[42px] min-w-[90px]"
          >
            <span>➕</span> Novo
          </button>
          <button
            (click)="sincronizar()"
            class="flex items-center justify-center gap-2 bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-semibold shadow-md text-sm active:scale-95 h-[42px] min-w-[90px]"
          >
            <span>🔄</span> Sync
          </button>

          <button
            (click)="fileInput.click()"
            class="flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-semibold shadow-md text-sm active:scale-95 h-[42px]"
          >
            <span>📥</span> Importar
          </button>

          <input
            #fileInput
            type="file"
            (change)="onFileChange($event)"
            class="hidden"
            accept=".xlsx, .xls"
          />

          <button
            (click)="exportarExcel()"
            class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold shadow-md text-sm active:scale-95 h-[42px]"
          >
            <span>📤</span> Exportar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div
    class="flex-1 overflow-y-auto bg-white shadow-xl rounded-2xl border border-gray-100 custom-scrollbar"
  >
    <table class="min-w-full table-auto border-collapse">
      <thead class="bg-gray-100 sticky top-0 z-10 shadow-sm">
        <tr>
          <th
            class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase w-auto min-w-[200px]"
          >
            Usuário
          </th>

          <th
            class="px-2 py-3 text-left text-xs font-bold text-gray-500 uppercase w-[15%] min-w-[140px]"
          >
            Setor
          </th>

          <th
            class="px-2 py-3 text-left text-xs font-bold text-gray-500 uppercase w-[20%] min-w-[160px]"
          >
            Empresa
          </th>

          <th class="px-2 py-3 text-center text-xs font-bold text-gray-500 uppercase w-[120px]">
            Pontos
          </th>

          <th class="px-2 py-3 text-center text-xs font-bold text-gray-500 uppercase w-[100px]">
            Perfil
          </th>

          <th class="px-2 py-3 text-center text-xs font-bold text-gray-500 uppercase w-[90px]">
            Status
          </th>

          <th class="px-4 py-3 text-center text-xs font-bold text-gray-500 uppercase w-[80px]">
            Histórico
          </th>
          <th class="px-4 py-3 text-center text-xs font-bold text-gray-500 uppercase w-[60px]">
            Ações
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let user of filteredUsers" class="hover:bg-gray-50 group">
          <td class="px-4 py-3 whitespace-nowrap">
            <div class="flex items-center">
              <div
                class="h-9 w-9 flex-shrink-0 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-sm mr-3 overflow-hidden"
              >
                <img
                  *ngIf="user.foto"
                  [src]="getFotoUrl(user.foto)"
                  class="w-full h-full object-cover"
                />
                <span *ngIf="!user.foto">{{ user.nome_completo?.charAt(0) }}</span>
              </div>
              <div class="overflow-hidden">
                <div
                  class="text-sm font-bold text-gray-900 truncate max-w-[180px]"
                  [title]="user.nome_completo"
                >
                  {{ user.nome_completo }}
                </div>
                <div
                  class="text-[10px] text-indigo-500 font-bold italic uppercase truncate max-w-[180px]"
                >
                  🏢 {{ user.empresa }}
                </div>
              </div>
            </div>
          </td>

          <td class="px-2 py-3 whitespace-nowrap">
            <div class="max-w-[140px] truncate" [title]="user.setor || 'Geral'">
              <span
                class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium bg-gray-100 text-gray-700 border border-gray-200"
              >
                {{ user.setor || 'Geral' }}
              </span>
            </div>
          </td>

          <td class="px-2 py-3 whitespace-nowrap">
            <div class="relative w-full">
              <select
                (change)="alterarGrupo(user, $event)"
                class="block w-full pl-2 pr-6 py-1.5 text-xs font-semibold border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 rounded-md cursor-pointer shadow-sm transition-colors"
                [ngClass]="{
                  'bg-indigo-50 text-indigo-700 border-indigo-200': user.grupo_id,
                  'bg-gray-50 text-gray-400 border-gray-200': !user.grupo_id,
                }"
              >
                <option value="null" [selected]="!user.grupo_id">Sem Empresa</option>
                @for (g of gruposDisponiveis; track g.id) {
                  <option [value]="g.id" [selected]="user.grupo_id === g.id">
                    {{ g.nome }}
                  </option>
                }
              </select>
            </div>
          </td>

          <td class="px-2 py-3 text-center whitespace-nowrap">
            <div
              class="flex items-center justify-center gap-2 bg-emerald-50 border border-emerald-100 rounded-lg px-2 py-1"
            >
              <span class="font-black text-emerald-600 text-sm">{{ user.pontos }}</span>
              <button
                (click)="editarPontos(user)"
                class="text-emerald-400 hover:text-emerald-700 hover:bg-emerald-200 rounded-full p-1 transition-all"
                title="Ajustar Pontos"
              >
                📊
              </button>
            </div>
          </td>

          <td class="px-2 py-3 text-center">
            <select
              [ngModel]="user.perfil"
              (change)="alterarPerfil(user, $event)"
              class="text-xs border rounded p-1 bg-white focus:ring-1 focus:ring-indigo-500"
            >
              <option value="USER">User</option>
              <option value="ADMIN">Admin</option>
            </select>
          </td>

          <td class="px-2 py-3 text-center">
            <button
              (click)="toggleStatus(user)"
              [class]="user.ativo ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'"
              class="px-3 py-0.5 rounded-full text-[10px] font-bold uppercase w-[60px]"
            >
              {{ user.ativo ? 'Ativo' : 'Inat.' }}
            </button>
          </td>

          <td class="px-4 py-3 text-center whitespace-nowrap">
            <button
              (click)="verLogs(user)"
              class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 p-2 rounded-full transition-all text-lg"
              title="Ver Histórico Completo"
            >
              📜
            </button>
          </td>
          <td class="px-4 py-3 text-center whitespace-nowrap">
            <button
              (click)="editarUsuario(user)"
              class="text-blue-400 hover:text-blue-600 hover:bg-blue-50 p-2 rounded-full transition-all text-lg mr-1"
              title="Editar Dados Cadastrais"
            >
              ✏️
            </button>
            <button
              (click)="excluirUsuario(user)"
              class="text-gray-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-full transition-all text-lg"
              title="Excluir Usuário"
            >
              🗑️
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
